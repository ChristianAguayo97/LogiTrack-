# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: LogiTrack CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Test-API:

    runs-on: ubuntu-latest

    # Variables .env falsas para que no arroje excepcion (porque al ejecutar main, siempre ejecuta el db.py)
    env:
      MYSQL_SERVER: localhost
      MYSQL_PORT: 3306
      MYSQL_USER: fake_user
      MYSQL_PASSWORD: fake_password
      MYSQL_DB: fake_db

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Entrenar Modelo de IA
      run: python -m src.ml.entrenar_modelo
    - name: Test with pytest
      run: pytest -v
